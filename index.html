<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="/static/manifest.json?v=5">
    <title>Aurelia</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aurelia">

    <style>
        /* --- GLOBAL AESTHETICS --- */
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #050505;
            --term-green: #00ff41;
            --term-dark: #002200;
            --text-main: #cccccc;
            --text-dim: #777777;
            --pixel-border: 1px solid #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; 
            height: 100dvh; 
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGATION TABS --- */
        #NavBar {
            display: flex;
            background: #111;
            border-bottom: var(--pixel-border);
            height: 40px;
            flex-shrink: 0;
        }
        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: inherit;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-btn.active {
            color: var(--term-green);
            background: var(--term-dark);
            border-bottom: 2px solid var(--term-green);
        }

        /* --- VIEW CONTAINERS --- */
        .view-container {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            min-height: 0; 
            padding: 8px;
            gap: 8px;
        }
        .view-container.active {
            display: flex;
        }

        /* --- TOP GRID (Avatar + Thermals + Subconscious) --- */
        #TopGrid {
            display: grid;
            grid-template-columns: 40% 60%;
            gap: 8px;
            height: 130px; 
            flex-shrink: 0; 
        }

        .panel-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .panel-box {
            border: var(--pixel-border);
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .header-label {
            font-size: 9px;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 2px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .header-label.green { color: var(--term-green); }

        /* Avatar Box */
        #AvatarBox {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0; 
            overflow: hidden;
        }
        #AureliaAvatar {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            transform: scale(1.0); 
        }

        /* Thermals Box */
        #ThermalsBox {
            padding: 6px;
            justify-content: center;
            gap: 5px;
            flex-shrink: 0; 
        }
        .somatic-bar {
            display: flex;
            align-items: center;
            font-size: 9px;
            color: var(--term-green);
        }
        .bar-label { width: 35px; }
        .bar-fill-container {
            flex: 1;
            height: 8px;
            background: #222;
            margin-left: 5px;
        }
        .bar-fill { height: 100%; background: var(--term-green); width: 0%; transition: width 0.3s; }

        /* Subconscious Box */
        #TerminalBox {
            flex: 1; 
            padding: 6px;
            font-size: 9px;
            color: var(--term-green);
            overflow-y: auto;
            line-height: 1.2;
        }

        /* --- CHAT AREA (Middle Section) --- */
        #ChatContainer {
            flex: 1;
            border: var(--pixel-border);
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 8px;
            overflow-y: auto;
            gap: 6px;
            font-size: 11px;
            line-height: 1.3;
        }
        .msg-geiger { color: var(--text-main); }
        .msg-aurelia { color: var(--term-green); }

        /* --- INPUT AREA (Bottom Section) --- */
        #InputArea {
            display: flex;
            gap: 5px;
            height: 40px;
            flex-shrink: 0;
        }
        .eye-btn {
            background: #111;
            border: var(--pixel-border);
            color: var(--text-dim);
            padding: 0 10px;
            cursor: pointer;
            font-size: 14px;
        }
        #InputWrapper {
            flex: 1;
            display: flex;
            border: var(--pixel-border);
            background: #000;
            align-items: center;
            padding-left: 8px;
        }
        .prompt-arrow {
            color: var(--term-green);
            font-weight: bold;
            margin-right: 5px;
        }
        #ChatInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: inherit;
            outline: none;
            font-size: 13px;
        }
        .send-btn {
            background: var(--term-green);
            color: #000;
            border: none;
            width: 45px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        .send-btn:active { background: #00cc33; }

        /* --- LIBRARY VIEW --- */
        #LibraryList { padding: 10px; overflow-y: auto; flex: 1; }
        .library-item { padding: 10px; border: var(--pixel-border); margin-bottom: 8px; background: #111; cursor: pointer; }
        .library-item h3 { font-size: 12px; color: var(--term-green); }
        .library-item p { font-size: 10px; color: #777; margin-top: 4px; }

        /* --- REPORT CANVAS MODAL --- */
        #ReportCanvas {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background: #f4ecd8; color: #1a1a1a; font-family: 'Georgia', serif;
            z-index: 1000; transition: top 0.3s ease; display: flex; flex-direction: column;
        }
        #ReportCanvas.open { top: 0; }
        #ReportHeader { background: #111; color: #fff; padding: 12px; display: flex; justify-content: space-between; font-family: 'Courier New', monospace; font-size: 12px; }
        #ReportContent { flex: 1; padding: 15px; overflow-y: auto; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        #CloseReportBtn { background: var(--accent-red); color: #fff; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
        
        #MobileEyeInput { display: none; }
    </style>
</head>
<body>

    <audio id="VoicePlayer" autoplay playsinline></audio>

    <div id="NavBar">
        <button class="nav-btn active" onclick="switchView('PortalView')">AURELIA V1.0</button>
        <button class="nav-btn" onclick="switchView('LibraryView')">LIBRARY</button>
    </div>

    <div id="PortalView" class="view-container active">
        
        <div id="TopGrid">
            <div class="panel-col">
                <div class="header-label green">AURELIA V1.0</div>
                <div class="panel-box" id="AvatarBox">
                    <img id="AureliaAvatar" src="/static/aurelia_pixel.png" alt="Aurelia Pixel" onerror="this.style.display='none'">
                </div>
            </div>

            <div class="panel-col">
                <div class="panel-box" id="ThermalsBox">
                    <div class="somatic-bar">
                        <span class="bar-label">CPU</span>
                        <div class="bar-fill-container"><div class="bar-fill" id="bar-cpu"></div></div>
                        <span id="text-cpu" style="margin-left: 6px; min-width: 35px; text-align: right;">--°C</span>
                    </div>
                    <div class="somatic-bar">
                        <span class="bar-label">iGPU</span>
                        <div class="bar-fill-container"><div class="bar-fill" id="bar-igpu"></div></div>
                        <span id="text-igpu" style="margin-left: 6px; min-width: 35px; text-align: right;">--°C</span>
                    </div>
                    <div class="somatic-bar">
                        <span class="bar-label">eGPU</span>
                        <div class="bar-fill-container"><div class="bar-fill" id="bar-egpu"></div></div>
                        <span id="text-egpu" style="margin-left: 6px; min-width: 35px; text-align: right;">--°C</span>
                    </div>
                </div>

                <div class="panel-box" id="TerminalBox">
                    > [SYSTEM] 13B Subconscious Terminal Booted...<br>
                </div>
            </div>
        </div>

        <div id="ChatContainer">
            <div class="msg-geiger">Geiger (User): [SYSTEM] Secure Tether Established.</div>
        </div>

        <div id="InputArea">
            <button class="eye-btn" onclick="document.getElementById('MobileEyeInput').click()">[+]</button>
            <button class="eye-btn" style="color: #FF8F00;" onclick="promptSetGoal()">[🦊]</button>
            <input type="file" id="MobileEyeInput" accept="image/*" capture="environment">
            <div id="InputWrapper">
                <span class="prompt-arrow">></span>
                <input type="text" id="ChatInput" autocomplete="off">
            </div>
            <button class="send-btn" onclick="sendChatMessage()">></button>
        </div>
    </div>

    <div id="LibraryView" class="view-container">
        <div id="LibraryList">
            <div style="color:#777; text-align:center; margin-top:20px;">Fetching Archives...</div>
        </div>
    </div>

    <div id="ReportCanvas">
        <div id="ReportHeader">
            <span id="ReportTitle">DOCUMENT_VIEWER</span>
            <button id="CloseReportBtn" onclick="closeReport()">X CLOSE</button>
        </div>
        <div id="ReportContent"></div>
    </div>

    <script>
        function switchView(viewId) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            event.currentTarget.classList.add('active');

            if (viewId === 'LibraryView') {
                fetchLibrary();
            }
        }

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsHost = `${wsProtocol}//${window.location.host}`;
        let portalWS = null;
        let systemWS = null;

        // --- FIXED: DECOUPLED WEBSOCKET RECONNECTIONS ---
        // This prevents the PWA from accidentally stacking multiple zombie connections 
        // when the phone screen turns off and suspends the browser.
        function connectPortalWS() {
            if (portalWS) {
                portalWS.onclose = null; 
                portalWS.close();
            }
            
            portalWS = new WebSocket(`${wsHost}/ws/portal`);
            
            portalWS.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "audio") {
                    const player = document.getElementById('VoicePlayer');
                    player.src = data.url + "?t=" + new Date().getTime();
                    player.play().catch(e => console.log("Tap required to play audio."));
                } 
                else if (data.type === "chat") {
                    appendChat('msg-aurelia', `Aurelia: ${data.text}`);
                    if (data.text.includes("<REPORT>")) {
                        showNotification("Aurelia handed you a document. Check Library.");
                    }
                }
                else if (data.type === "notification") {
                    appendChat('msg-aurelia', `[SYSTEM] ${data.message}`);
                }
            };
            
            portalWS.onclose = () => setTimeout(connectPortalWS, 5000);
        }

        function connectSystemWS() {
            if (systemWS) {
                systemWS.onclose = null;
                systemWS.close();
            }
            
            systemWS = new WebSocket(`${wsHost}/ws/system`);
            
            systemWS.onmessage = (event) => {
                const payload = JSON.parse(event.data);
                if (payload.type === "somatic_data") {
                    updateSomaticHUD(payload.data);
                } else if (payload.type === "terminal_log") {
                    appendTerminal(payload.text);
                }
            };
            
            systemWS.onclose = () => setTimeout(connectSystemWS, 5000);
        }

        function connectWebSockets() {
            connectPortalWS();
            connectSystemWS();
        }
        // -------------------------------------------------

        function appendChat(className, text) {
            const box = document.getElementById('ChatContainer');
            const msg = document.createElement('div');
            msg.className = className;
            msg.textContent = text;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        function appendTerminal(text) {
            const term = document.getElementById('TerminalBox');
            term.innerHTML += `> ${text}<br>`;
            term.scrollTop = term.scrollHeight;
        }

        function updateSomaticHUD(data) {
            const clamp = (val, max) => Math.min(100, Math.max(0, (val / max) * 100));
            
            const cpu = data.cpu_thermals || 0;
            const igpu = data.brain_thermals_strix || 0;
            const egpu = data.eye_thermals_v620 || 0;

            document.getElementById('bar-cpu').style.width = clamp(cpu, 90) + '%';
            document.getElementById('bar-igpu').style.width = clamp(igpu, 90) + '%';
            document.getElementById('bar-egpu').style.width = clamp(egpu, 90) + '%';

            document.getElementById('text-cpu').innerText = cpu.toFixed(1) + '°C';
            document.getElementById('text-igpu').innerText = igpu.toFixed(1) + '°C';
            document.getElementById('text-egpu').innerText = egpu.toFixed(1) + '°C';
        }

        function sendChatMessage() {
            const input = document.getElementById('ChatInput');
            const text = input.value.trim();
            if (text && portalWS && portalWS.readyState === WebSocket.OPEN) {
                portalWS.send(JSON.stringify({ type: "chat", text: text }));
                appendChat('msg-geiger', `Geiger (User): ${text}`);
                input.value = '';
                
                setTimeout(() => {
                    const box = document.getElementById('ChatContainer');
                    box.scrollTop = box.scrollHeight;
                }, 100);
            }
        }
        
        function promptSetGoal() {
            const goal = prompt("Define a new internal goal for Aurelia's Subconscious Lobe:");
            if (goal && goal.trim() !== '') {
                if (portalWS && portalWS.readyState === WebSocket.OPEN) {
                    portalWS.send(JSON.stringify({ type: "set_goal", text: goal.trim() }));
                    appendChat('msg-geiger', `Geiger (User): [Goal Injected] ${goal.trim()}`);
                }
            }
        }

        document.getElementById('ChatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendChatMessage();
        });

        document.getElementById('MobileEyeInput').addEventListener('change', async function() {
            if (this.files && this.files[0]) {
                appendChat('msg-geiger', 'Geiger (User): [Uploading Optic Feed...]');
                const formData = new FormData();
                formData.append('file', this.files[0]);
                try {
                    await fetch('/upload_image', { method: 'POST', body: formData });
                } catch (err) {
                    appendChat('msg-aurelia', '[ERROR] Optic Feed Failed.');
                }
            }
        });

        async function fetchLibrary() {
            try {
                const res = await fetch('/api/library');
                const data = await res.json();
                const list = document.getElementById('LibraryList');
                list.innerHTML = '';
                
                if (!data.reports || data.reports.length === 0) {
                    list.innerHTML = '<div style="color:#777; text-align:center;">Archive is empty.</div>';
                    return;
                }

                data.reports.forEach(report => {
                    const div = document.createElement('div');
                    div.className = 'library-item';
                    div.innerHTML = `<h3>${report.title}</h3><p>${new Date(report.created_at * 1000).toLocaleString()}</p>`;
                    div.onclick = () => openReport(report.filename, report.title);
                    list.appendChild(div);
                });
            } catch (err) {
                console.error("Failed to fetch library", err);
            }
        }

        async function openReport(filename, title) {
            try {
                const res = await fetch(`/library_files/${filename}`);
                const content = await res.text();
                document.getElementById('ReportTitle').textContent = title;
                if(filename.endsWith('.html')) {
                     document.getElementById('ReportContent').innerHTML = content;
                } else {
                     document.getElementById('ReportContent').textContent = content;
                }
                document.getElementById('ReportCanvas').classList.add('open');
            } catch(err) {
                alert("Failed to load document.");
            }
        }

        function closeReport() {
            document.getElementById('ReportCanvas').classList.remove('open');
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.style.cssText = "position:absolute; top:60px; left:50%; transform:translateX(-50%); background:var(--term-green); color:#000; padding:10px; font-weight:bold; border-radius:4px; z-index:999; text-align:center; width:80%; font-size:12px;";
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }

        connectWebSockets();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => {
                console.log("[SYSTEM] Neural Service Worker Active.");
            });
        }
    </script>
</body>
</html>
